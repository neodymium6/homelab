---
- name: Validate Jellyfin library layout
  ansible.builtin.assert:
    that:
      - storage_jellyfin_layout_libraries is sequence
      - storage_jellyfin_layout_libraries is not string
      - storage_jellyfin_layout_libraries | length > 0
    fail_msg: "storage.jellyfin.libraries must contain at least one entry with non-empty name and path."

- name: Validate Jellyfin library entries
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.path is defined
      - item.name | string | trim | length > 0
      - item.path | string | trim | length > 0
      - (item.path | string | trim) is match('^' ~ (storage_jellyfin_layout_share_path | regex_escape) ~ '(/|$)')
    fail_msg: >-
      Each storage.jellyfin.libraries entry must define a non-empty name and a path
      under {{ storage_jellyfin_layout_share_path }}.
  loop: "{{ storage_jellyfin_layout_libraries }}"
  loop_control:
    label: "{{ item.name | default('unnamed-library') }}"

- name: Ensure Jellyfin library directories exist on storage hosts
  ansible.builtin.file:
    path: "{{ item.path | trim }}"
    state: directory
    owner: root
    group: "{{ storage_jellyfin_layout_group }}"
    mode: "{{ storage_jellyfin_layout_mode }}"
  loop: "{{ storage_jellyfin_layout_libraries }}"
  loop_control:
    label: "{{ item.name }}"
