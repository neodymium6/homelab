---
- name: Ensure ARM group exists
  ansible.builtin.group:
    name: "{{ arm_group }}"
    state: present

- name: Ensure ARM user exists
  ansible.builtin.user:
    name: "{{ arm_user }}"
    group: "{{ arm_group }}"
    home: "{{ arm_home_dir }}"
    create_home: false
    shell: /usr/sbin/nologin
    state: present

- name: Lookup ARM user id
  ansible.builtin.command:
    argv:
      - id
      - -u
      - "{{ arm_user }}"
  register: arm_uid_cmd
  changed_when: false

- name: Lookup ARM group id
  ansible.builtin.command:
    argv:
      - id
      - -g
      - "{{ arm_user }}"
  register: arm_gid_cmd
  changed_when: false

- name: Ensure ARM directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(arm_user) }}"
    group: "{{ item.group | default(arm_group) }}"
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - { path: "{{ arm_dir }}", owner: "root", group: "root", mode: "0755" }
    - { path: "{{ arm_home_dir }}" }
    - { path: "{{ arm_logs_dir }}" }
    - { path: "{{ arm_media_dir }}" }
    - { path: "{{ arm_config_dir }}" }

- name: Deploy ARM docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ arm_compose_path }}"
    mode: "0644"
  notify: Restart arm
