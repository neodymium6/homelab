---
- name: Ensure NFS client package is installed
  ansible.builtin.apt:
    name: "{{ storage_nfs_client_packages }}"
    state: present
    update_cache: yes
  become: true

- name: Ensure NFS server address is configured
  ansible.builtin.assert:
    that:
      - storage_nfs_client_server | trim | length > 0
    fail_msg: "storage_nfs_client_server must not be empty."

- name: Ensure NFS mount path exists
  ansible.builtin.file:
    path: "{{ storage_nfs_client_mount_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Mount shared storage over NFS
  ansible.posix.mount:
    path: "{{ storage_nfs_client_mount_path }}"
    src: "{{ storage_nfs_client_server }}:{{ storage_nfs_client_export_path }}"
    fstype: "nfs"
    opts: "{{ storage_nfs_client_mount_opts }}"
    state: mounted
  become: true
