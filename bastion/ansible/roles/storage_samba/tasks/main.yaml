---
- name: Ensure Samba credentials are configured
  ansible.builtin.assert:
    that:
      - storage_samba_user | trim | length > 0
      - storage_samba_password | trim | length > 0
    fail_msg: "storage.samba.user and secrets.storage.samba_password must both be set."

- name: Ensure Samba packages are installed
  ansible.builtin.apt:
    name: "{{ storage_samba_packages }}"
    state: present
    update_cache: yes
  become: true

- name: Ensure Samba user exists as a local account
  ansible.builtin.getent:
    database: passwd
    key: "{{ storage_samba_user }}"

- name: Render Samba configuration
  ansible.builtin.template:
    src: smb.conf.j2
    dest: "/etc/samba/smb.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart Samba services
  become: true

- name: Ensure Samba services are enabled and running
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ storage_samba_services }}"
  become: true

- name: List existing Samba accounts
  ansible.builtin.command:
    argv:
      - pdbedit
      - -L
  register: storage_samba_accounts
  changed_when: false
  failed_when: false
  become: true

- name: Check whether Samba share user already exists
  ansible.builtin.set_fact:
    storage_samba_user_exists: >-
      {{
        storage_samba_accounts.rc == 0 and
        (
          storage_samba_accounts.stdout_lines
          | select('search', '^' ~ storage_samba_user ~ ':')
          | list
          | length
        ) > 0
      }}

- name: Create Samba account for share user
  ansible.builtin.command:
    argv:
      - smbpasswd
      - -s
      - -a
      - "{{ storage_samba_user }}"
    stdin: |
      {{ storage_samba_password }}
      {{ storage_samba_password }}
  when: not storage_samba_user_exists
  no_log: true
  changed_when: true
  become: true

- name: Update Samba password when requested
  ansible.builtin.command:
    argv:
      - smbpasswd
      - -s
      - "{{ storage_samba_user }}"
    stdin: |
      {{ storage_samba_password }}
      {{ storage_samba_password }}
  when:
    - storage_samba_user_exists
    - storage_samba_update_password | bool
  no_log: true
  changed_when: true
  become: true

- name: Allow Samba from local network via ufw
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    src: "{{ storage_samba_ufw_allow_cidr }}"
  loop: "{{ storage_samba_ufw_rules }}"
  when:
    - storage_samba_ufw_enable | bool
    - storage_samba_ufw_allow_cidr | trim | length > 0
  become: true
