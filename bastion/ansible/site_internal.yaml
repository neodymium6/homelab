    forgejo_enable_ufw: "{{ forgejo_service.enable_ufw | default(true) }}"
    forgejo_web_enable_ufw: "{{ forgejo_enable_ufw | bool and (forgejo_service.proxy is defined) and (forgejo_service.proxy.enable | default(false) | bool) }}"
    forgejo_ssh_enable_ufw: "{{ forgejo_service.ssh_enable_ufw | default(forgejo_enable_ufw) }}"
