---
- import_playbook: plays/inventory_from_cluster.yaml

- name: Harden SSH on internal hosts
  hosts: internal
  become: true
  gather_facts: true

  vars_files:
    - ../../cluster.yaml

  vars:
    bastion_ip: "{{ network.base_prefix }}.{{ vms['bastion-01'].vmid }}"

  roles:
    - role: ssh_hardening
      vars:
        ssh_allow_from_ip: "{{ bastion_ip }}"
        install_fail2ban: false

- name: Harden SSH on proxy hosts and allow web traffic
  hosts: proxy
  become: true
  gather_facts: true

  vars_files:
    - ../../cluster.yaml

  vars:
    bastion_ip: "{{ network.base_prefix }}.{{ vms['bastion-01'].vmid }}"
    proxy_allow_cidr: "{{ network.base_prefix }}.0/{{ network.cidr_suffix }}"

  roles:
    - role: ssh_hardening
      vars:
        ssh_allow_from_ip: "{{ bastion_ip }}"
        install_fail2ban: true

  tasks:
    - name: Allow HTTP/HTTPS to proxy via ufw
      loop:
        - "80"
        - "443"
      loop_control:
        loop_var: proxy_port
      community.general.ufw:
        rule: allow
        port: "{{ proxy_port }}"
        proto: tcp
        src: "{{ proxy_allow_cidr }}"

- name: Configure shared storage access on non-bastion hosts
  hosts: "cluster:!bastion"
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: storage_access
      vars:
        storage_access_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
        storage_access_gid: "{{ ((storage | default({})).access | default({})).gid | default(2000) | int }}"
        storage_access_users: "{{ ((((storage | default({})).access | default({})).users | default([])) + [login_user]) | unique }}"

- name: Prepare storage disk on storage hosts
  hosts: storage
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: storage_disk
      vars:
        storage_disk_mount_path: "{{ (storage | default({})).mount_path | default('/mnt/storage') }}"
        storage_disk_expected_size_gb: "{{ ((storage | default({})).data_disk | default({})).size_gb | default(0) | int }}"
    - role: storage_access
      vars:
        storage_access_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
        storage_access_gid: "{{ ((storage | default({})).access | default({})).gid | default(2000) | int }}"
        storage_access_manage_group: false
        storage_access_manage_users: false
        storage_access_manage_share_path: true
        storage_access_share_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
    - role: storage_media_layout
      vars:
        storage_media_layout_base_path: "{{ (((storage | default({})).media | default({})).base_path) | default((((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share')) ~ '/music') }}"
        storage_media_layout_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
    - role: storage_immich_layout
      when: (storage | default({})).immich is defined
      vars:
        storage_immich_layout_upload_path: "{{ storage.immich.upload_path }}"
        storage_immich_layout_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
    - role: storage_jellyfin_layout
      when: (((storage | default({})).jellyfin | default({})).libraries | default([]) | length) > 0
      vars:
        storage_jellyfin_layout_libraries: "{{ storage.jellyfin.libraries }}"
        storage_jellyfin_layout_share_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
        storage_jellyfin_layout_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
    - role: storage_nfs_server
      when: (((storage | default({})).nfs | default({})).clients | default([]) | length) > 0
      vars:
        storage_nfs_server_export_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
        storage_nfs_server_clients: "{{ ((storage | default({})).nfs | default({})).clients | default([]) }}"
    - role: storage_samba
      vars:
        storage_samba_share_name: "{{ ((storage | default({})).samba | default({})).share_name | default('storage') }}"
        storage_samba_share_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
        storage_samba_user: "{{ ((storage | default({})).samba | default({})).user | default(login_user) }}"
        storage_samba_password: "{{ ((secrets | default({})).storage | default({})).samba_password | default('') }}"
        storage_samba_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
        storage_samba_ufw_allow_cidr: "{{ network.base_prefix }}.0/{{ network.cidr_suffix }}"

- name: Mount shared NFS storage on whitelisted hosts
  hosts: "cluster:!bastion:!storage"
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  vars:
    storage_nfs_client_names: "{{ ((storage | default({})).nfs | default({})).clients | default([]) }}"
    storage_nfs_server_name: "{{ (vms | dict2items | selectattr('value.role', 'equalto', 'storage') | map(attribute='key') | list | first) | default('') }}"
    storage_nfs_server_ip: "{{ (network.base_prefix ~ '.' ~ (vms[storage_nfs_server_name].vmid | string)) if (storage_nfs_server_name | length > 0) else '' }}"

  roles:
    - role: storage_nfs_client
      when:
        - inventory_hostname in storage_nfs_client_names
        - storage_nfs_server_ip | length > 0
      vars:
        storage_nfs_client_mount_path: "{{ ((storage | default({})).nfs | default({})).mount_path | default('/mnt/nfs') }}"
        storage_nfs_client_export_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
        storage_nfs_client_server: "{{ storage_nfs_server_ip }}"

- name: Configure Traefik on proxy hosts
  hosts: proxy
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: traefik

- name: Run Cloudflare Tunnel on proxy hosts
  hosts: proxy
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: cloudflare_tunnel

- name: Install Docker on app hosts
  hosts: app
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: docker
      vars:
        docker_users:
          - "{{ login_user }}"

- name: Install Docker on rip hosts
  hosts: rip
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: docker
      vars:
        docker_users:
          - "{{ login_user }}"

- name: Deploy ARM on rip hosts
  hosts: rip
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  vars:
    arm_service: "{{ (services | default([]) | selectattr('name', 'equalto', 'arm') | list | first) | default({}) }}"
    arm_enabled: "{{ arm_service != {} and arm_service.target_vm is defined }}"
    arm_target_vm: "{{ arm_service.target_vm | default('') }}"
    arm_port: >-
      {{
        (arm_service.proxy.port | int)
        if (
          arm_service.proxy is defined and
          arm_service.proxy.port is defined
        )
        else 8080
      }}
    arm_storage_group: "{{ ((storage | default({})).access | default({})).group | default('storage') }}"
    arm_storage_gid: "{{ ((storage | default({})).access | default({})).gid | default(2000) | int }}"
    arm_storage_share_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
    arm_storage_mount_path: "{{ ((storage | default({})).nfs | default({})).mount_path | default('/mnt/nfs') }}"
    arm_media_base_path: "{{ (((storage | default({})).media | default({})).base_path) | default(arm_storage_share_path ~ '/music') }}"
    arm_timezone: "{{ timezone | default('UTC') }}"
    arm_music_dir: "{{ (arm_media_base_path | replace(arm_storage_share_path, arm_storage_mount_path)) ~ '/incoming' }}"
    arm_enable_ufw: "{{ (arm_service.proxy is defined) and (arm_service.proxy.enable | default(false) | bool) }}"
    arm_proxy_ip: "{{ network.base_prefix }}.{{ vms['proxy-01'].vmid }}"

  roles:
    - role: arm
      when:
        - arm_enabled | bool
        - inventory_hostname == arm_target_vm

