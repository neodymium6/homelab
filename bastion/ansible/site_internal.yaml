    music_ingest_storage_share_path: "{{ ((storage | default({})).access | default({})).share_path | default(((storage | default({})).mount_path | default('/mnt/storage')) ~ '/share') }}"
    music_ingest_storage_mount_path: "{{ ((storage | default({})).nfs | default({})).mount_path | default('/mnt/nfs') }}"
    music_ingest_media_base_path: "{{ (((storage | default({})).media | default({})).base_path) | default(music_ingest_storage_share_path ~ '/music') }}"
    music_ingest_nfs_music_path: "{{ music_ingest_media_base_path | replace(music_ingest_storage_share_path, music_ingest_storage_mount_path) }}"
    music_ingest_incoming_dir: "{{ music_ingest_nfs_music_path }}/incoming"
    music_ingest_library_dir: "{{ music_ingest_nfs_music_path }}/library"
    music_ingest_timezone: "{{ timezone | default('UTC') }}"
    music_ingest_enable_ufw: "{{ (music_ingest_service.proxy is defined) and (music_ingest_service.proxy.enable | default(false) | bool) }}"
    music_ingest_proxy_ip: "{{ network.base_prefix }}.{{ vms['proxy-01'].vmid }}"

