---
- import_playbook: plays/inventory_from_cluster.yaml

- name: Generate internal SSH keypair on bastion
  hosts: bastion
  gather_facts: false
  become: false

  roles:
    - role: ssh_keypair
      vars:
        ssh_key_path: "~/.ssh/id_ed25519_internal"

- name: Harden SSH on bastion
  hosts: bastion
  become: true
  gather_facts: true

  roles:
    - role: ssh_hardening
      vars:
        ssh_allow_from_ip: null       # Allow SSH from anywhere
        install_fail2ban: true

- name: Configure SSH client on bastion for internal hosts
  hosts: bastion
  gather_facts: false
  become: false

  vars_files:
    - ../../cluster.yaml

  roles:
    - role: ssh_client_config

- name: Join bastion to Tailscale
  hosts: bastion
  become: true
  gather_facts: false

  vars_files:
    - ../../cluster.yaml

  vars:
    ts_cfg: "{{ tailscale | default({}) }}"
    ts_node: "{{ (ts_cfg.nodes | default({}))[inventory_hostname] | default({}) }}"

  roles:
    - role: tailscale
      when:
        - ts_cfg.enable | default(false) | bool
        - inventory_hostname in (ts_cfg.nodes | default({})).keys() | list
      vars:
        tailscale_auth_key: "{{ ((secrets | default({})).tailscale | default({})).auth_key | default('') }}"
        tailscale_hostname: "{{ inventory_hostname }}"
        tailscale_advertise_tags: "{{ ts_node.advertise_tags | default([]) }}"
        tailscale_advertise_routes: "{{ ts_node.advertise_routes | default([]) }}"
        tailscale_enable_ip_forward: "{{ ts_node.enable_ip_forward | default(false) | bool }}"
        tailscale_accept_routes: "{{ ts_node.accept_routes | default(false) | bool }}"
        tailscale_ssh: "{{ ts_node.ssh | default(false) | bool }}"
