name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/requirements-ci.txt

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/requirements-ci.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r .github/ansible-collections.yml

      - name: Prepare cluster fixture for syntax checks
        run: cp cluster.yaml.example cluster.yaml

      - name: Check Terraform formatting
        run: |
          terraform fmt -check -recursive local/terraform
          terraform fmt -check -recursive bastion/terraform

      - name: Check Ansible syntax
        env:
          ANSIBLE_LOCAL_TEMP: /tmp/ansible-local
        run: |
          mkdir -p "$ANSIBLE_LOCAL_TEMP"

          cd local/ansible
          ansible-playbook --syntax-check -i localhost, site_local.yaml

          cd ../../bastion/ansible
          ansible-playbook --syntax-check -i localhost, site_bastion.yaml
          ansible-playbook --syntax-check -i localhost, site_internal.yaml
          ansible-playbook --syntax-check -i localhost, site_homemanager.yaml

      - name: Compile Python helpers
        run: python -m py_compile bastion/ansible/roles/alertmanager/files/am_ntfy_bridge/app.py
